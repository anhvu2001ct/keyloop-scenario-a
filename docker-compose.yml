services:
  appointment-service:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    environment:
      - APP_PORT=8080
      - LOG_FORMAT=json
      - APP_ENV=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=appointment
      - DB_SSLMODE=disable
    depends_on:
      alloy:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
  
  db-migrate:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: ["sh", "-c", "sleep 1 && ./migrate up --env=production --db=postgres && sleep 2"]
    environment:
      - APP_PORT=8080
      - LOG_FORMAT=json
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=appointment
      - DB_SSLMODE=disable
    depends_on:
      alloy:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:18.3-alpine3.23
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=appointment
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appointment"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  alloy:
    image: grafana/alloy:v1.14.0
    privileged: true
    ports:
      - 12345:12345
    environment:
      ALLOY_DEPLOY_MODE: docker
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/12345'"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - loki
      - tempo

  loki:
    image: grafana/loki:3.6.7
    ports:
      - '3100:3100'
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.10.1
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:12.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
     - 3000:3000/tcp
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources